name: CI Node.js Project

on:
  push:
    branches: 
      -main
  pull_request:
    branches:
      -main
      
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: actions/checkout@v6
        uses: actions/setup-node@v6
        with:
          node-version: 14

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
